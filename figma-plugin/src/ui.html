<!DOCTYPE html>
<html>
  <body>
    <button id="export">Export Tokens</button>
    <p id="status"></p>

    <script>
      const status = document.getElementById('status');

      document.getElementById('export').onclick = () => {
        status.textContent = 'Extracting tokens...';
        parent.postMessage({ pluginMessage: { type: 'export-tokens' } }, '*');
      };

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;
        if (!msg || msg.type !== 'tokens-ready') return;

        status.textContent = `Sending ${msg.tokens.length} tokens to backend...`;

        try {
          const res = await fetch('http://localhost:3000/api/tokens', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tokens: msg.tokens }),
          });

          const data = await res.json();
          status.textContent = `Done! ${data.count} tokens synced.`;
        } catch (err) {
          status.textContent = 'Error: Could not reach backend. Is it running?';
        }
      };
    </script>
  </body>
</html>
