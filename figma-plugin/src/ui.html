<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: #1e1e1e;
        color: #ffffff;
        padding: 20px;
        width: 400px;
      }

      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        color: #ffffff;
      }

      p {
        font-size: 12px;
        color: #999;
        margin-bottom: 20px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #18a0fb;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #0d8de0;
      }

      #status {
        margin-top: 14px;
        font-size: 12px;
        color: #aaa;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h2>AlignUI — Token Exporter</h2>
    <p>Select elements on the canvas, then click export to extract design tokens.</p>
    <button id="export">Export Tokens</button>
    <div id="status"></div>

    <script>
      const btn = document.getElementById('export');
      const status = document.getElementById('status');

      btn.onclick = () => {
        status.textContent = 'Extracting tokens...';
        parent.postMessage({ pluginMessage: { type: 'export-tokens' } }, '*');
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (msg && msg.type === 'tokens-ready') {
          status.textContent = `✓ ${msg.tokens.length} token(s) extracted. Check console.`;
        }
      };
    </script>
  </body>
</html>
